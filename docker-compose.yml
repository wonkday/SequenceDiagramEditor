version: "3.8"

services:
  editor:
    build:
      context: .
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    image: ${IMAGE_NAME}
    container_name: ${CONTAINER_NAME}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - editor-data:/app/data
    environment:
      - PORT=${PORT}
      - SHARE_TTL_DAYS=${SHARE_TTL_DAYS}
      - SHARE_MAX_FILES=${SHARE_MAX_FILES}
      - SHARE_MAX_SIZE_MB=${SHARE_MAX_SIZE_MB}
    restart: unless-stopped

volumes:
  editor-data:
